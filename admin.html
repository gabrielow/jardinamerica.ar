<!DOCTYPE html>
<!--
  Página de login para GitHub Pages (jardinamerica.ar/admin.html)
  → Copiar este archivo como admin.html en el repo gabrielow/jardinamerica.ar
  → Redirige directamente al login en admin.ite.com.ar (mismo origen, sin CORS)
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Admin — ITe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Jura', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin: 0 0 .4rem; }
    .sub { color: #666; font-size: .875rem; margin: 0 0 2rem; }
    .btn {
      display: block; width: 100%; padding: .85rem;
      background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 8px;
      color: #e0e0e0; font-family: 'Jura', sans-serif; font-size: 1rem;
      font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .btn:hover { background: #242424; border-color: #555; color: #fff; }
    .back { margin-top: 1.2rem; font-size: .85rem; }
    .back a { color: #555; text-decoration: none; }
    .back a:hover { color: #aaa; }
  </style>
</head>
<body>
<div class="card">
  <h1>🤖 Panel de Administración</h1>
  <p class="sub">ITe — Inteligencia Tecnológica</p>
  <a class="btn" href="https://admin.ite.com.ar/login.html">Ingresar al panel →</a>
  <div class="back"><a href="https://jardinamerica.ar">← Volver a jardinamerica.ar</a></div>
</div>
</body>
</html>
